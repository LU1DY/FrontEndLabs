<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<link rel="stylesheet" href="fale-conosco.css" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Boldonse&family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
			rel="stylesheet" />
	</head>
	<body>
		<main>
			<form action="" class="container">
				<header class="header__form">
					<h1>Fale Conosco</h1>
					<p>
						Estamos aqui para ajudar! Preencha o formulário abaixo e
						entraremos em contato com você o mais breve possível.
					</p>
				</header>
				<div class="inputs-container">
					<div class="div__input">
						<label for="">Primeiro Nome</label>
						<input type="text" placeholder="Seu nome..." />
					</div>
					<div class="div__input">
						<label for="">Último Nome</label>
						<input type="text" placeholder="Seu sobrenome..." />
					</div>
					<div class="div__input">
						<label for="">E-mail</label>
						<input type="email" placeholder="Seu email..." />
					</div>
					<div class="div__select">
						<label for="pais">País</label>
						<select name="pais" id="pais">
							<option value="Selecione" selected disabled>
								Selecione
							</option>
							<option value="Brasil">Brasil</option>
							<option value="Africa do Sul">Africa do Sul</option>
							<option value="País de Gales">País de Gales</option>
						</select>
					</div>
					<div class="div__textarea">
						<label for="assunto">Assunto</label>
						<textarea
							name="assunto"
							id="assunto"
							cols="30"
							rows="2"
							placeholder="Escreva aqui..."></textarea>
					</div>
					<div class="div__btns">
						<button type="submit" class="btn__limpar">
							Limpar
						</button>
						<button type="submit" class="btn__enviar">
							Enviar
						</button>
					</div>
				</div>
				<h2>Em caso de dúvida entre em contato 📞</h2>
			</form>
		</main>
	</body>
</html>
