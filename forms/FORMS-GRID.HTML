<!DOCTYPE html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<title>Formulário</title>
		<link rel="stylesheet" href="forms-grid.css" />
	</head>
	<body>
		<main>
			<div class="container">
				<div class="header">
					<h1>Faça seu cadastro!</h1>
					<p>Compre online 🛒</p>
				</div>

				<form class="form">
					<div class="section">
						<h2>Dados Pessoais</h2>

						<label>Nome</label>
						<input type="text" />

						<label>E-mail</label>
						<input type="email" />

						<label>Data de Nascimento</label>
						<input type="date" />

						<label>CPF</label>
						<input type="text" placeholder="000.000.000-00" />
					</div>

					<div class="section">
						<h2>Endereço</h2>

						<label for="rua">Rua</label>
						<input placeholder="Sua rua..." id="rua" type="text" />

						<label for="number">Número</label>
						<input placeholder="Seu número.." id="number" type="number" />

						<label for="bairro">Bairro</label>
						<input placeholder="Seu bairro..." id="bairro" type="text" />

						<label for="cep">CEP</label>
						<input placeholder="Seu CEP..." id="cep" type="text" placeholder="00000-000" />

						<label for="cidade">Cidade</label>
						<input placeholder="Sua cidade..." id="cidade" type="text" />

						<label for="estado">Estado</label>
						<select id="estado">
							<option>Selecione um estado</option>
							<option>MG</option>
							<option>SP</option>
							<option>RJ</option>
						</select>
					</div>

					<div class="section">
						<h2>Login</h2>

						<label for="imagem">Imagem de perfil</label>
						<input id="imagem" type="file" />

						<label for="login">Login</label>
						<input placeholder="Seu usuário..." id="login" type="text" />

						<label for="senha">Senha</label>
						<input placeholder="Sua senha..." id="senha" type="password" />

						<label for="confirmação">Confirmação de Senha</label>
						<input placeholder="Confirme sua senha..." id="confirmação" type="password" />
					</div>

					<div class="buttons">
						<button type="reset" class="cancelar">Cancelar</button>
						<button type="submit" class="enviar">Enviar</button>
					</div>
				</form>
			</div>
		</main>
	</body>
</html>
